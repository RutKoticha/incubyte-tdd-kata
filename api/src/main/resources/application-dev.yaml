spring:
    datasource:
        url: jdbc:postgresql://localhost:5432/dealership_dev
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: org.postgresql.Driver
    jpa:
        hibernate:
            ddl-auto: update
        show-sql: true
        properties:
            hibernate:
                format_sql: true
                highlight_sql: true

management:
    endpoints:
        web:
            exposure:
                include: health, info, metrics
