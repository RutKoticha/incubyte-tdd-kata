server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: api
  profiles:
    active: dev
  config:
    import: file:.env[.properties]

security:
  jwt:
    secret: ${JWT_SECRET:supersecretkeyforjwtsigningsupersecretkeyforjwtsigningsupersecretkeyforjwtsigning}
    expiration: 86400000

spring-doc:
    api-docs:
      path: /api-docs
    swagger-ui:
      path: /swagger-ui.html
      operations-sorter: method
      tag-sorter: alpha
