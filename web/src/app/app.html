<div class="m3-toast-container" aria-live="polite">
  @for (toast of toastService.toasts(); track toast.id) {
    <div class="m3-toast animate-toast" [class]="'m3-toast-' + toast.type" role="alert">
      <span class="m3-toast-message">{{ toast.message }}</span>
      <button 
        class="m3-toast-close" 
        (click)="toastService.dismiss(toast.id)" 
        aria-label="Dismiss toast"
      >
        &times;
      </button>
    </div>
  }
</div>
